<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>amphub client setup</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0f172a;
        --card: #111827;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --border: #334155;
        --primary: #22d3ee;
        --danger: #f87171;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: radial-gradient(circle at top, #0b2138 0%, var(--bg) 50%);
        color: var(--text);
        display: grid;
        place-items: center;
        padding: 24px;
      }
      .card {
        width: min(640px, 100%);
        border: 1px solid var(--border);
        border-radius: 12px;
        background: color-mix(in srgb, var(--card) 88%, black 12%);
        padding: 24px;
      }
      h1 { margin-top: 0; margin-bottom: 8px; }
      p { color: var(--muted); line-height: 1.45; }
      label { display: block; margin: 14px 0 6px; font-weight: 600; }
      input {
        width: 100%;
        height: 40px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #0b1220;
        color: var(--text);
        padding: 0 12px;
      }
      .actions { display: flex; gap: 10px; margin-top: 16px; }
      button {
        height: 38px;
        border-radius: 8px;
        border: 1px solid transparent;
        padding: 0 14px;
        cursor: pointer;
        color: #031118;
        background: var(--primary);
        font-weight: 600;
      }
      button.secondary {
        color: var(--text);
        background: transparent;
        border-color: var(--border);
      }
      button:disabled { opacity: 0.6; cursor: not-allowed; }
      .status { min-height: 20px; margin-top: 10px; color: var(--muted); }
      .status.error { color: var(--danger); }
      .hint { font-size: 12px; color: var(--muted); }
    </style>
  </head>
  <body>
    <main class="card" aria-labelledby="setup-title">
      <h1 id="setup-title">Connect amphub client</h1>
      <p>
        Enter the amphub server address hosted in your Docker environment.
        The client stores this value locally and opens that URL on launch.
      </p>

      <label for="server-url">Amphub server URL</label>
      <input id="server-url" placeholder="https://amphub.your-domain.com" autocomplete="url" />
      <div class="hint">Example: https://amphub.example.com or http://192.168.1.10:3000</div>

      <div class="actions">
        <button id="save-connect">Save and connect</button>
        <button id="reset" class="secondary">Reset saved server</button>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="./renderer.js"></script>
  </body>
</html>
