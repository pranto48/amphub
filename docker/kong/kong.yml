_format_version: '2.1'
_transform: true

services:
  - name: auth-v1
    url: http://auth:9999/
    routes:
      - name: auth-v1-all
        strip_path: true
        paths:
          - /auth/v1/

  - name: rest-v1
    url: http://rest:3000/
    routes:
      - name: rest-v1-all
        strip_path: true
        paths:
          - /rest/v1/

  - name: realtime-v1
    url: http://realtime:4000/socket/
    protocol: http
    routes:
      - name: realtime-v1-websocket
        strip_path: true
        paths:
          - /realtime/v1/
        protocols:
          - http
          - https
