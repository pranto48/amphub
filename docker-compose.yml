services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: remoteops
      POSTGRES_PASSWORD: remoteops
      POSTGRES_DB: remoteops
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U remoteops -d remoteops"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://remoteops:remoteops@db:5432/remoteops
      JWT_SECRET: ${JWT_SECRET:-please-change-me}
      CORS_ORIGIN: "*"
      PORT: "4000"
    expose:
      - "4000"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  db_data:
