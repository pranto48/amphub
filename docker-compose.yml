services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4455:4455"
    environment:
      NODE_ENV: production
      PORT: 4455
      # Point these to your local/self-hosted Supabase gateway
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-http://localhost:8000}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY:-local-dev-anon-key}
      SUPABASE_URL: ${SUPABASE_URL:-http://localhost:8000}
      SUPABASE_PUBLISHABLE_KEY: ${SUPABASE_PUBLISHABLE_KEY:-local-dev-anon-key}
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: remoteops-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: remoteops
      POSTGRES_USER: remoteops
      POSTGRES_PASSWORD: remoteops_strong_password_change_me
    ports:
      - "5433:5432"
    volumes:
      - remoteops-db-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d

volumes:
  remoteops-db-data:
